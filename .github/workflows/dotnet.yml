name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore -c Release

    - name: Test
      run: dotnet test --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

    - name: Self-analysis (dogfooding)
      run: |
        COVERAGE=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
        if [ -n "$COVERAGE" ]; then
          dotnet run --project DotNetTestRadar -c Release -- analyze \
            --solution DotNetTestRadar.slnx \
            --coverage "$COVERAGE" \
            --format json --top 10 > /dev/null
          echo "Self-analysis completed successfully"
        else
          echo "No coverage file found — skipping self-analysis"
        fi

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: nuget-publish

    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Pack
      run: dotnet pack DotNetTestRadar/DotNetTestRadar.csproj -c Release -o ./nupkg

    - name: NuGet login (OIDC)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push to NuGet.org
      run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json"
